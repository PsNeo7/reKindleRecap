<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
    }

    h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #8e44ad;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #888;
    }

    input {
      width: 100%;
      padding: 8px;
      background: #222;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #8e44ad;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #8e44ad;
      color: #white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover {
      background: #9b59b6;
    }

    .status {
      font-size: 0.8rem;
      margin-top: 10px;
      text-align: center;
    }

    .success {
      color: #4caf50;
    }
  </style>
</head>

<body>
  <h2>Rekindle Setup</h2>
  <div class="form-group">
    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your key here...">
  </div>
  <button id="saveBtn">Save Configuration</button>
  <button id="testBtn" style="background:#444; margin-top: 8px;">Test Connectivity</button>
  <div id="status" class="status"></div>
  <div id="testResult" style="font-size: 0.75rem; margin-top: 8px; color: #888; white-space: pre-wrap;"></div>
  <script src="src/extension/popup.js"></script>
</body>

</html>
